name: CI

on:
  pull_request:
  push:
    branches: [master, staging]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Generate
        run: yarn generate
      - name: Ensure generated files are committed
        run: |
          if ! git diff --exit-code; then
            echo "Generated files are out of date. Run yarn generate and commit the changes."
            git diff --name-only
            exit 1
          fi
      - name: Validate config values
        run: yarn validate

  publish-staging:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/staging'
    runs-on: ubuntu-latest
    environment: staging
    env:
      CONSUL_HTTP_ADDR: ${{ secrets.STAGING_CONSUL_HTTP_ADDR }}
      CONSUL_HTTP_TOKEN: ${{ secrets.STAGING_CONSUL_HTTP_TOKEN }}
      GIT_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Generate
        run: yarn generate
      - name: Ensure generated files are committed
        run: |
          if ! git diff --exit-code; then
            echo "Generated files are out of date. Run yarn generate and commit the changes."
            git diff --name-only
            exit 1
          fi
      - name: Validate config values
        run: yarn validate
      - name: Publish to staging Consul
        run: yarn publish:consul

  publish-prod:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    environment: production
    env:
      CONSUL_HTTP_ADDR: ${{ secrets.PROD_CONSUL_HTTP_ADDR }}
      CONSUL_HTTP_TOKEN: ${{ secrets.PROD_CONSUL_HTTP_TOKEN }}
      GIT_COMMIT: ${{ github.sha }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Enable corepack
        run: corepack enable
      - name: Install
        run: yarn install --immutable
      - name: Build
        run: yarn build
      - name: Generate
        run: yarn generate
      - name: Ensure generated files are committed
        run: |
          if ! git diff --exit-code; then
            echo "Generated files are out of date. Run yarn generate and commit the changes."
            git diff --name-only
            exit 1
          fi
      - name: Validate config values
        run: yarn validate
      - name: Publish to prod Consul
        run: yarn publish:consul
